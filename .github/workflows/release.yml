name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: "10"
  RUSTUP_MAX_RETRIES: "10"

jobs:
  # Gate the release on the same checks as CI — on every OS CI tests — so a tag pushed on a bad
  # commit can't publish artifacts that `main`/PR CI would have rejected.
  test:
    name: Test gate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          cache: false

      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1

      - run: cargo test --workspace --locked
      - run: cargo clippy --all-targets --all-features --workspace --locked -- -D warnings

  build:
    name: Build (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          target: ${{ matrix.target }}
          cache: false

      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          key: ${{ matrix.target }}

      # The C-bundled SQLite in `core` needs a cross C toolchain for the Linux targets;
      # `cross` ships those images, so the gnu/musl × x86_64/aarch64 builds go through it.
      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@e3134ec54b36203e18f2d1e80652058bd078dd91 # v2.77.3
        with:
          tool: cross

      - name: Build release binaries
        shell: bash
        env:
          MATRIX_TARGET: ${{ matrix.target }}
          MATRIX_CROSS: ${{ matrix.cross }}
        run: |
          set -euo pipefail
          builder="cargo"
          [ "$MATRIX_CROSS" = "true" ] && builder="cross"
          "$builder" build --release --locked --target "$MATRIX_TARGET" \
            --bin hatel --bin hatel-hook

      # One self-contained archive per target: both binaries (receiver + hook) and the Claude
      # Code skill, so the installer downloads once and gets the whole product, version-locked.
      # The name is unversioned: the pinned download URL carries the version in its path
      # (`/releases/download/vX/...`) and `latest` uses `/releases/latest/download/...`, so one
      # name serves both with no alias mirroring and no version-detection in the installer.
      - name: Package
        id: package
        shell: bash
        env:
          MATRIX_TARGET: ${{ matrix.target }}
          MATRIX_OS: ${{ matrix.os }}
        run: |
          set -euo pipefail
          target="$MATRIX_TARGET"
          stem="hatel-${target}"
          mkdir -p staging/skill
          cp .claude/skills/hatel/SKILL.md staging/skill/SKILL.md
          if [ "$MATRIX_OS" = "windows-latest" ]; then
            cp "target/${target}/release/hatel.exe" staging/
            cp "target/${target}/release/hatel-hook.exe" staging/
            archive="${stem}.zip"
            (cd staging && 7z a "../${archive}" hatel.exe hatel-hook.exe skill >/dev/null)
          else
            cp "target/${target}/release/hatel" staging/
            cp "target/${target}/release/hatel-hook" staging/
            archive="${stem}.tar.gz"
            tar -C staging -czf "${archive}" hatel hatel-hook skill
          fi
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${archive}" > "${archive}.sha256"
          else
            shasum -a 256 "${archive}" > "${archive}.sha256"
          fi
          echo "archive=${archive}" >> "$GITHUB_OUTPUT"
          echo "checksum=${archive}.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
